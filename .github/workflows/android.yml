name: Android CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Fix gradle-wrapper.jar (download fresh)
        run: |
          GRADLE_VERSION="8.4"
          JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar"
          curl -fsSL "$JAR_URL" -o CallX2/gradle/wrapper/gradle-wrapper.jar
          ls -lh CallX2/gradle/wrapper/gradle-wrapper.jar

      - name: Inject google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > CallX2/app/google-services.json
          python3 -c "import json; json.load(open('CallX2/app/google-services.json')); print('google-services.json OK')"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: CallX2

      # ✅ FIXED: Use Termux Debug Keystore
      - name: Use Fixed Debug Keystore
        run: |
          mkdir -p ~/.config/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.config/.android/debug.keystore

      - name: Get SHA-1
        run: ./gradlew signingReport
        working-directory: CallX2

      - name: Print SHA-1 for Firebase
        run: |
          cd CallX2
          ./gradlew signingReport 2>&1 | grep -A5 "Variant: debug"

      - name: Run Lint
        run: ./gradlew lint
        working-directory: CallX2

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: CallX2/app/build/reports/lint-results-*.html
          retention-days: 7

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: CallX2

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: CallX2/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Inject google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > CallX2/app/google-services.json

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Fix gradle-wrapper.jar
        run: |
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o CallX2/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: CallX2

      # ✅ SAME FIX HERE ALSO
      - name: Use Fixed Debug Keystore
        run: |
          mkdir -p ~/.config/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.config/.android/debug.keystore

      - name: Get SHA-1
        run: ./gradlew signingReport
        working-directory: CallX2

      - name: Print SHA-1 for Firebase
        run: |
          cd CallX2
          ./gradlew signingReport 2>&1 | grep -A5 "Variant: debug"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > callx_release.jks
        working-directory: CallX2

      - name: Build Release APK (Signed)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/CallX2/callx_release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace
        working-directory: CallX2

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: CallX2/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Clean up Keystore
        if: always()
        run: rm -f CallX2/callx_release.jks
