name: Android CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 17 set karo (build.gradle me VERSION_17 hai)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # google-services.json Firebase secret se inject karo
      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
        working-directory: CallX2

      # Gradle cache for fast builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Gradlew ko executable banao
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: CallX2

      # Lint check
      - name: Run Lint
        run: ./gradlew lint
        working-directory: CallX2

      # Lint report upload (fail ho ya na ho)
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: CallX2/app/build/reports/lint-results-*.html
          retention-days: 7

      # Debug APK build
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: CallX2

      # Debug APK artifact save karo
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: CallX2/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Release Build (sirf main/master pe)
  # ─────────────────────────────────────────────
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
        working-directory: CallX2

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: CallX2

      # Keystore file decode karke disk pe rakh do
      - name: Decode Keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > callx_release.jks
        working-directory: CallX2

      # Release APK sign karke build karo
      - name: Build Release APK (Signed)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/CallX2/callx_release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace
        working-directory: CallX2

      # Release APK artifact save karo
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: CallX2/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Keystore file delete karo (security)
      - name: Clean up Keystore
        if: always()
        run: rm -f CallX2/callx_release.jks
