plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
}
android {
    namespace 'com.callx.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.callx.app"
        minSdk 23
        targetSdk 34
        versionCode 103
        versionName "4.0.0"
        vectorDrawables.useSupportLibrary = true
    }
    buildTypes {
        debug { minifyEnabled false; debuggable true }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures { viewBinding true }
    packagingOptions {
        resources {
            excludes += [
                'META-INF/AL2.0','META-INF/LGPL2.1','META-INF/DEPENDENCIES',
                'META-INF/LICENSE*','META-INF/NOTICE*'
            ]
        }
    }
    lint { checkReleaseBuilds false; abortOnError false }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.13.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.viewpager2:viewpager2:1.0.0'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.activity:activity:1.8.2'
    implementation 'androidx.fragment:fragment:1.6.2'
    implementation 'androidx.media:media:1.7.0'
    implementation 'androidx.work:work-runtime:2.9.0'
    implementation 'androidx.media3:media3-exoplayer:1.2.1'
    implementation 'androidx.media3:media3-ui:1.2.1'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    // Biometric (Fingerprint)
    implementation 'androidx.biometric:biometric:1.1.0'
    // Encrypted SharedPreferences for secure local storage
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    // Pattern lock view
    implementation project(':patternlockview')

    // Firebase
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-storage'

    // WebRTC
    implementation 'io.getstream:stream-webrtc-android:1.1.2'

    // Networking
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // Image loading — Glide (supports GIF natively)
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.16.0'

    // Circular avatar
    implementation 'de.hdodenhof:circleimageview:3.1.0'

    // ── NEW Feature 2: Location ──────────────────────────────────────────
    implementation 'com.google.android.gms:play-services-location:21.2.0'
    implementation 'com.google.android.gms:play-services-maps:18.2.0'

    // ── NEW Feature 15: E2E Encryption (built-in javax.crypto — no extra dep) ──
    // Java Cryptography API is part of Android SDK — no extra dependency needed.

    // ── NEW Feature 12: Transcription — SpeechRecognizer (built-in) ─────
    // android.speech.SpeechRecognizer is part of Android SDK.

    // ── JSON parsing for GIF API ─────────────────────────────────────────
    // org.json is part of Android SDK — no extra dependency needed.
}
